name: Deploy Backend to GCP

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docker-compose.prod.yml'
      - 'Caddyfile'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to GCP VM
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_VM_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          timeout: 30m
          script: |
            cd ~/price-tracker-agent-playground || mkdir -p ~/price-tracker-agent-playground
            
            cd ~/price-tracker-agent-playground || exit 1
            
            # 刪除潛在的損毀版控資料夾並重新完整的 Clone 程式碼
            if [ -d ".git" ]; then
              rm -rf .git
            fi
            
            git init
            git remote add origin https://github.com/${{ github.repository }}.git
            git fetch origin main
            git reset --hard origin/main
            
            # 從 GitHub Secrets 中動態寫入環境變數到 .env.prod
            echo "POSTGRES_USER=${{ secrets.DB_USER }}" > .env.prod
            echo "POSTGRES_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env.prod
            echo "POSTGRES_DB=${{ secrets.DB_NAME }}" >> .env.prod
            echo "PGADMIN_EMAIL=${{ secrets.PGADMIN_EMAIL }}" >> .env.prod
            echo "PGADMIN_PASSWORD=${{ secrets.PGADMIN_PASSWORD }}" >> .env.prod
            echo "DATABASE_URL=postgresql://${{ secrets.DB_USER }}:${{ secrets.DB_PASSWORD }}@postgres:5432/${{ secrets.DB_NAME }}" >> .env.prod
            echo "SECRET_KEY=${{ secrets.BACKEND_SECRET_KEY }}" >> .env.prod
            echo "ALGORITHM=HS256" >> .env.prod
            echo "ACCESS_TOKEN_EXPIRE_MINUTES=1440" >> .env.prod
            
            # 重新啟動服務
            docker-compose --env-file .env.prod -f docker-compose.prod.yml up -d --build
